server:
  port: ${SERVER_PORT:8088}

spring:
  codec:
    max-in-memory-size: -1
  config:
    import:
      - optional:file:../.env[.properties]
      - optional:file:../env/gateway-service.env[.properties]
  application:
    name: Gateway-Service
  cloud:
    gateway:
      httpclient:
        connect-timeout: 2000
        response-timeout: 5s
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - ${FRONTEND_BASE_URL:http://localhost:3000}
                  - http://localhost:3001
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - '*'
                allow-credentials: true
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin RETAIN_FIRST
            - RemoveRequestHeader=Origin
          routes:
            - id: commerce-service-user-subscription
              uri: lb://Commerce-Service
              predicates:
                - Path=/api/v1/users/me/subscription
              filters:
                - name: CircuitBreaker
                  args:
                    name: commerceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/commerce

            - id: commerce-service-user-token-usage
              uri: lb://Commerce-Service
              predicates:
                - Path=/api/v1/users/me/token-usage
              filters:
                - name: CircuitBreaker
                  args:
                    name: commerceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/commerce

            # commerce-service-user-subscription/-token-usage와 동일한 override 패턴 — 아래
            # user-service-users(/api/v1/users/**)·workspace-service(/api/v1/notes/**)보다
            # 라우트 목록에서 먼저 나와야 더 구체적인 이 두 경로가 먼저 매칭된다. 지금까지는
            # next.config.mjs의 rewrite가 이 두 경로를 Intelligence-Service로 먼저 가로채서
            # Gateway에 라우트가 없어도 웹 프론트에서는 드러나지 않았을 뿐, Gateway 공개 API
            # 기준으로는 계약과 실제 라우팅이 어긋나 있었다(Gateway를 직접 호출하는 클라이언트는
            # 각각 Workspace-Service/User-Service로 잘못 라우팅되어 404가 났다).
            - id: intelligence-service-style-profile
              uri: lb://intelligence-service
              predicates:
                - Path=/api/v1/users/me/style-profile
              filters:
                - name: CircuitBreaker
                  args:
                    name: intelligenceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/intelligence

            - id: intelligence-service-notes-summary
              uri: lb://intelligence-service
              predicates:
                - Path=/api/v1/notes/{noteId}/summary
              filters:
                - name: CircuitBreaker
                  args:
                    name: intelligenceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/intelligence

            # /api/v1/ai/** 캐치올(아래 intelligence-service 라우트)보다 먼저 나와야 이 경로가
            # Intelligence-Service가 아니라 Commerce-Service(entitlement/사용량 소유 서비스)로 간다.
            - id: commerce-service-ai-usage
              uri: lb://Commerce-Service
              predicates:
                - Path=/api/v1/ai/usage
              filters:
                - name: CircuitBreaker
                  args:
                    name: commerceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/commerce

            - id: intelligence-service
              uri: lb://intelligence-service
              predicates:
                - Path=/api/v1/intelligence/**,/api/v1/ai/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: intelligenceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/intelligence

            - id: internal-user-service-users
              uri: lb://User-Service
              predicates:
                - Path=/internal/v1/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            - id: internal-user-service-support
              uri: lb://User-Service
              predicates:
                - Path=/internal/v1/support/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            - id: internal-commerce-service
              uri: lb://Commerce-Service
              predicates:
                - Path=/internal/v1/billing/**,/internal/v1/plans/**,/internal/v1/entitlements/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: commerceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/commerce

            - id: internal-user-health
              uri: lb://User-Service
              predicates:
                - Path=/internal/v1/health/user
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user
                    statusCodes:
                      - 503
                - RewritePath=/internal/v1/health/user,/actuator/health

            - id: internal-commerce-health
              uri: lb://Commerce-Service
              predicates:
                - Path=/internal/v1/health/commerce
              filters:
                - name: CircuitBreaker
                  args:
                    name: commerceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/commerce
                    statusCodes:
                      - 503
                - RewritePath=/internal/v1/health/commerce,/actuator/health

            - id: internal-workspace-health
              uri: lb://Workspace-Service
              predicates:
                - Path=/internal/v1/health/workspace
              filters:
                - name: CircuitBreaker
                  args:
                    name: workspaceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/workspace
                    statusCodes:
                      - 503
                - RewritePath=/internal/v1/health/workspace,/actuator/health

            - id: internal-workspace-service
              uri: lb://Workspace-Service
              predicates:
                - Path=/internal/v1/workspace/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: workspaceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/workspace

            - id: internal-ingestion-health
              uri: lb://ingestion-service
              predicates:
                - Path=/internal/v1/health/ingestion
              filters:
                - name: CircuitBreaker
                  args:
                    name: ingestionServiceCircuitBreaker
                    fallbackUri: forward:/fallback/ingestion
                    statusCodes:
                      - 503
                - RewritePath=/internal/v1/health/ingestion,/actuator/health

            - id: internal-intelligence-health
              uri: lb://intelligence-service
              predicates:
                - Path=/internal/v1/health/intelligence
              filters:
                - name: CircuitBreaker
                  args:
                    name: intelligenceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/intelligence
                    statusCodes:
                      - 503
                - RewritePath=/internal/v1/health/intelligence,/actuator/health

            - id: internal-mcp-health
              uri: lb://mcp-service
              predicates:
                - Path=/internal/v1/health/mcp
              filters:
                - RewritePath=/internal/v1/health/mcp,/actuator/health

            - id: user-service-auth
              uri: lb://User-Service
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            - id: user-service-oauth
              uri: ${USER_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/v1/oauth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            - id: mcp-service
              uri: lb://mcp-service
              predicates:
                - Path=/api/v1/mcp/**,/mcp,/mcp/**

            - id: user-service-users
              uri: lb://User-Service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            - id: user-service-support
              uri: lb://User-Service
              predicates:
                - Path=/api/v1/support/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    fallbackUri: forward:/fallback/user

            - id: workspace-service
              uri: lb://Workspace-Service
              predicates:
                - Path=/api/v1/workspace/**,/api/v1/workspaces,/api/v1/workspaces/**,/api/v1/notes,/api/v1/notes/**,/api/v1/folders,/api/v1/folders/**,/api/v1/recent-activities,/api/v1/recent-activities/**,/api/v1/tags/**,/api/v1/favorites/**,/api/v1/graph,/api/v1/graph/**,/api/v1/share-links,/api/v1/share-links/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: workspaceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/workspace

            - id: ingestion-service
              uri: lb://ingestion-service
              predicates:
                - Path=/api/v1/imports/**,/api/v1/exports,/api/v1/exports/**,/v1/publish-jobs,/v1/publish-jobs/**,/api/v1/extension/**,/api/v1/assets/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: ingestionServiceCircuitBreaker
                    fallbackUri: forward:/fallback/ingestion

            - id: commerce-service
              uri: lb://Commerce-Service
              predicates:
                - Path=/api/v1/plans,/api/v1/plans/**,/api/v1/subscriptions/**,/api/v1/billing/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: commerceServiceCircuitBreaker
                    fallbackUri: forward:/fallback/commerce

            - id: admin-service
              uri: lb://Admin-Service
              predicates:
                - Path=/api/v1/admin/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: adminServiceCircuitBreaker
                    fallbackUri: forward:/fallback/admin

# resilience4j의 reactor TimeLimiter 기본 timeout-duration은 1s로, 위 httpclient.response-timeout(5s)
# 보다 먼저 끊겨 정상 응답도 503(fallback)으로 떨어뜨린다. userServiceCircuitBreaker(로그인/OAuth
# callback이 걸리는 /api/v1/auth/** 라우트)는 외부 OAuth 제공자 호출(token 교환 + 프로필 조회)이
# 1s를 넘기기 쉬우므로, httpclient 타임아웃이 실제 상한이 되도록 6s로 맞춘다.
resilience4j:
  timelimiter:
    instances:
      userServiceCircuitBreaker:
        timeout-duration: 6s
      # Notion 재귀 임포트(ImportService.createNotionImportJob)가 현재 동기 처리라 페이지 구조에
      # 따라 수십 초~수 분까지 걸릴 수 있어(2026-07-06 05:22~05:25 로그 기준 실사례), 기본 1s로는
      # 정상 요청도 전부 503(fallback)으로 끊긴다. 근본 해결은 해당 임포트를 비동기로 전환하는 것이고,
      # 이 값은 그 전까지의 임시 완화책이다.
      ingestionServiceCircuitBreaker:
        timeout-duration: 60s
      # 채팅/에이전트 등 실제 LLM 호출(SSE 스트리밍 포함)은 1s 안에 끝나지 않는 게 정상이라,
      # 기본 1s로는 정상 응답도 전부 503(fallback)으로 끊긴다. 위 두 케이스와 동일한 문제.
      intelligenceServiceCircuitBreaker:
        timeout-duration: 30s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${server.port}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

brainx:
  jwt:
    secret: ${JWT_SECRET:replace_with_at_least_32_byte_secret}
  service-token: ${SERVICE_TOKEN:local-service-token}
  gateway:
    auth:
      public-paths:
        - /actuator/health
        - /actuator/info
        - /actuator/prometheus
        - /api/v1/auth/**
        - /oauth/token
        - /oauth/register
        - /.well-known/oauth-authorization-server
        - /.well-known/openid-configuration
        - /.well-known/oauth-protected-resource
        - /api/v1/plans
        - /api/v1/plans/**
        - /api/v1/assets/*/file
        - /api/v1/assets/*/slides/*
        - /api/v1/assets/*/slides/*/video
        - /api/v1/assets/proxy-image
        - /api/v1/mcp/**
        - /mcp
        - /mcp/**
    httpclient:
      dns:
        query-timeout: ${BRAINX_GATEWAY_DNS_QUERY_TIMEOUT:1s}
        cache-max-ttl: ${BRAINX_GATEWAY_DNS_CACHE_MAX_TTL:30s}
        cache-min-ttl: ${BRAINX_GATEWAY_DNS_CACHE_MIN_TTL:0s}
        cache-negative-ttl: ${BRAINX_GATEWAY_DNS_CACHE_NEGATIVE_TTL:1s}
        max-queries-per-resolve: ${BRAINX_GATEWAY_DNS_MAX_QUERIES_PER_RESOLVE:4}
        ndots: ${BRAINX_GATEWAY_DNS_NDOTS:1}
        retry-tcp-on-timeout: ${BRAINX_GATEWAY_DNS_RETRY_TCP_ON_TIMEOUT:false}
