openapi: 3.0.3
info:
  title: BrainX API SSOT - Knowledge Intelligence Consumed APIs
  version: 1.0.0-revised
  license:
    name: Proprietary
    url: https://brainx.p-e.kr
  description: OpenAPI slice for synchronous internal APIs consumed by Intelligence Service. Provider-owned API behavior remains
    governed by the source SSOT.
  x-client-apps:
  - id: web.next
    type: frontend
    description: Next.js App Router 기반 주력 웹 클라이언트
  - id: desktop.electron
    type: desktop
    description: brainx-next를 재사용하는 Electron 기반 PC 앱 셸
servers:
- url: https://brainx.p-e.kr
  description: AWS dev API 게이트웨이. 로컬 public API 개발은 Gateway-Service 기본 포트 8088을 사용한다. Workspace-Service 직접 개발/디버깅 포트는 8082이지만,
    이는 gateway 포트가 아니다.
- url: https://api.brainx.com
  description: 운영 API 게이트웨이
tags:
- name: Internal Service APIs
  description: 서비스 간 동기 호출 API. 브라우저나 외부 클라이언트에는 노출하지 않는다.
paths:
  /internal/v1/entitlements/check:
    post:
      operationId: checkEntitlementsInternal
      summary: '[Internal] 권한/쿼터 확인'
      tags:
      - Internal Service APIs
      x-producer-service: commerce-operations
      x-visibility: internal
      x-consumers:
      - id: internal.knowledge-intelligence
        type: internal-service
        description: Knowledge Intelligence 동기 호출자
      - id: internal.knowledge-workspace
        type: internal-service
        description: Knowledge Workspace 동기 호출자
      - id: internal.content-ingestion-publishing
        type: internal-service
        description: 콘텐츠 수집 작업 워커 동기 호출자
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      description: 서비스 호출 전 사전 preflight. 이벤트로 대체하지 않는다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntitlementsCheckRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/EntitlementsCheckData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - serviceTokenAuth: []
  /internal/v1/workspace/notes/bulk-create:
    post:
      operationId: bulkCreateNotesInternal
      summary: '[Internal] 노트 일괄 생성 command'
      tags:
      - Internal Service APIs
      x-producer-service: knowledge-workspace
      x-visibility: internal
      x-consumers:
      - id: internal.content-ingestion-publishing
        type: internal-service
        description: 콘텐츠 수집 작업 워커 동기 호출자
      - id: internal.mcp-service
        type: internal-service
        description: Mcp-Service create-note tool writes through the authoritative Workspace command API.
      - id: internal.knowledge-intelligence
        type: internal-service
        description: Intelligence Agent approved CREATE_NOTE actions write through the authoritative Workspace command API.
      x-produces-events:
      - NoteCreated
      x-internal-sync-calls: []
      x-async-boundary: false
      description: Import/extension/MCP가 노트 저장소를 직접 쓰지 않도록 하는 내부 command API.
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalNoteBulkCreateRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/InternalNoteBulkCreateData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - serviceTokenAuth: []
  /internal/v1/workspace/notes/{noteId}/snapshot:
    get:
      operationId: getNoteSnapshotInternal
      summary: '[Internal] 노트 최신 스냅샷 조회'
      tags:
      - Internal Service APIs
      x-producer-service: knowledge-workspace
      x-visibility: internal
      x-consumers:
      - id: internal.knowledge-intelligence
        type: internal-service
        description: Knowledge Intelligence 동기 호출자
      - id: internal.content-ingestion-publishing
        type: internal-service
        description: 콘텐츠 수집 작업 워커 동기 호출자
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      description: 기본은 이벤트 기반 read model 사용. 반드시 최신 원문이 필요한 작업에서만 호출한다.
      parameters:
      - name: noteId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/InternalNoteSnapshotData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - serviceTokenAuth: []
  /internal/v1/workspace/notes/{noteId}/content-patches:
    post:
      operationId: patchNoteContentInternal
      summary: '[Internal] 노트 본문 패치 command'
      tags:
      - Internal Service APIs
      x-producer-service: knowledge-workspace
      x-visibility: internal
      x-consumers:
      - id: internal.knowledge-intelligence
        type: internal-service
        description: Knowledge Intelligence 동기 호출자
      x-produces-events:
      - NoteContentSaved
      x-internal-sync-calls: []
      x-async-boundary: false
      description: AI 제안 수락 이후 타 서비스의 노트 변경을 Workspace 원장으로 강제한다.
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      - name: noteId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalNoteContentPatchRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/NoteContentSaveData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - serviceTokenAuth: []
components:
  securitySchemes:
    serviceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Shared internal service token used by Gateway and backend services for `/internal/v1/**` calls.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 명령 및 작업 요청에 권장한다. 같은 키로 재시도하면 같은 결과를 반환해야 한다.
  schemas:
    ApiSuccessBase:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - true
        message:
          type: string
      required:
      - success
      - message
      additionalProperties: false
    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - false
        data:
          type: object
          nullable: true
        message:
          type: string
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            traceId:
              type: string
            details:
              type: object
              additionalProperties: true
              description: 기계가 읽을 수 있는 오류 상세 정보
          required:
          - code
          - message
          additionalProperties: true
      required:
      - success
      - message
      additionalProperties: false
    NoteContentSaveData:
      type: object
      properties:
        noteId:
          type: string
        version:
          type: integer
        savedAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
          - SAVED
        conflict:
          type: object
          additionalProperties: true
      required:
      - noteId
      - version
      - savedAt
      - status
      additionalProperties: false
    EntitlementsCheckRequest:
      type: object
      properties:
        userId:
          type: string
          nullable: true
          description: '회원 userId. 게스트 호출은 Gateway가 발급한 gst_ 접두 게스트 id를 그대로 이 필드에 실어 보낼 수도 있다(단일 opaque actor id) — Commerce-Service가
            접두어로 회원/게스트를 판정한다. guestId가 별도로 채워져 있으면 그 값이 우선한다.

            '
        guestId:
          type: string
          nullable: true
          description: 게스트(비회원) actor id(gst_ 접두). userId와 동시에 채우지 않아도 된다.
        capability:
          type: string
          enum:
          - SEMANTIC_SEARCH
          - RAG_CHAT
          - AI_INLINE_ASSIST
          - AI_CLUSTERING
          - AI_INSIGHT_REPORT
          - EXPORT
          - SHARE_LINK
          - PUBLISH
          - IMPORT
        quantity:
          type: integer
          minimum: 1
        context:
          type: object
          additionalProperties: true
      required:
      - capability
      - quantity
      additionalProperties: false
    EntitlementsCheckData:
      type: object
      properties:
        allowed:
          type: boolean
        reason:
          type: string
          nullable: true
        remaining:
          type: integer
          nullable: true
          description: '회원은 이번 달 잔여 크레딧, 게스트는 잔여 AI 호출 횟수(총 10회 한도). 무제한 플랜이면 null.

            '
        entitlementSnapshotVersion:
          type: integer
      required:
      - allowed
      - entitlementSnapshotVersion
      additionalProperties: false
    InternalNoteBulkCreateRequest:
      type: object
      properties:
        userId:
          type: string
        source:
          type: string
          enum:
          - NOTION_IMPORT
          - OBSIDIAN_IMPORT
          - EXTENSION_CAPTURE
          - MCP_TOOL_CALL
          - INTELLIGENCE_AGENT
        documentGroupId:
          type: string
          nullable: true
          description: Optional target Workspace document group. If omitted, Workspace-Service resolves the user's default
            group.
        targetFolderId:
          type: string
          nullable: true
        notes:
          type: array
          items:
            type: object
            properties:
              externalId:
                type: string
                nullable: true
              title:
                type: string
              markdown:
                type: string
              tags:
                type: array
                items:
                  type: string
              assets:
                type: array
                items:
                  type: string
            required:
            - title
            - markdown
            additionalProperties: false
      required:
      - userId
      - source
      - notes
      additionalProperties: false
    InternalNoteBulkCreateData:
      type: object
      properties:
        createdNotes:
          type: array
          items:
            type: object
            properties:
              externalId:
                type: string
                nullable: true
              noteId:
                type: string
              version:
                type: integer
            required:
            - noteId
            - version
            additionalProperties: false
        failedItems:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
      - createdNotes
      - failedItems
      additionalProperties: false
    InternalNoteSnapshotData:
      type: object
      properties:
        noteId:
          type: string
        userId:
          type: string
          description: 이 노트의 Workspace 소유 사용자 ID.
        documentGroupId:
          type: string
          description: 이 노트의 Workspace document group 경계.
        title:
          type: string
        markdown:
          type: string
        tags:
          type: array
          items:
            type: string
        folderId:
          type: string
          nullable: true
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
      required:
      - noteId
      - userId
      - documentGroupId
      - title
      - markdown
      - version
      - updatedAt
      additionalProperties: false
    InternalNoteContentPatchRequest:
      type: object
      properties:
        sourceService:
          type: string
        baseVersion:
          type: integer
        patchType:
          type: string
          enum:
          - REPLACE_RANGE
          - APPEND
          - REPLACE_ALL
          - APPLY_AI_SUGGESTION
        patch:
          type: object
          additionalProperties: true
        causationId:
          type: string
      required:
      - sourceService
      - baseVersion
      - patchType
      - patch
      - causationId
      additionalProperties: false
x-extracted-from:
  source: contracts-v2/brainx-openapi.ssot.yaml
  consumerId: internal.knowledge-intelligence
  conflictSide: right
