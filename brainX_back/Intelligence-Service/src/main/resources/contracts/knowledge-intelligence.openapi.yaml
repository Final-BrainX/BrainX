components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    guestSessionAuth:
      type: apiKey
      in: cookie
      name: brainx_guest_id
      description: 게이트웨이가 발급한 게스트 워크스페이스 세션 쿠키. 비회원 임시 노트, 폴더, 링크, 그래프 체험 데이터에 사용한다.
    serviceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Shared internal service token used by Gateway and backend services for `/internal/v1/**` calls.
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 명령 및 작업 요청에 권장한다. 같은 키로 재시도하면 같은 결과를 반환해야 한다.
  schemas:
    ApiSuccessBase:
      type: object
      properties:
        success:
          type: boolean
          enum:
          - true
        message:
          type: string
      required:
      - success
      - message
      additionalProperties: false
    ApiErrorResponse:
      type: object
      properties:
        success:
