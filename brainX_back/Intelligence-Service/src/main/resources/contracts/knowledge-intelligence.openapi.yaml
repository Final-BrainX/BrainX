openapi: 3.0.3
info:
  title: BrainX API SSOT - Knowledge Intelligence
  version: 1.0.0-revised
  license:
    name: Proprietary
    url: https://brainx.p-e.kr
  description: 'BrainX 공개 및 내부 REST 계약 문서.


    개정 정책:

    - Public/client API는 현재 구현된 Ingestion 발행 헬퍼(/v1/publish-jobs)를 제외하고 /api/v1 아래에 둔다.

    - 서비스 간 동기 API는 /internal/v1 아래에 명시적으로 격리한다.

    - 중복된 회원 탈퇴 취소 엔드포인트는 제거했다.

    - /support/inquiries는 /support/tickets로 통합했다.

    - 토큰 사용량 기록은 AsyncAPI 이벤트 우선으로 처리하며 공개 REST command는 제공하지 않는다.

    - 발행 작업은 현재 클립보드용 콘텐츠를 포함해 200 OK를 반환한다.

    - operation 단위 소비자 메타데이터는 x-consumers로 표현한다.

    - operation 단위 이벤트 결합은 x-produces-events로 표현하고 AsyncAPI SSOT를 참조한다.

    - 2026-07 기준 공식 클라이언트 표면은 Next.js web app과 Electron desktop shell을 함께 고려한다.'
  x-client-apps:
  - id: web.next
    type: frontend
    description: Next.js App Router 기반 주력 웹 클라이언트
  - id: desktop.electron
    type: desktop
    description: brainx-next를 재사용하는 Electron 기반 PC 앱 셸
servers:
- url: https://brainx.p-e.kr
  description: AWS dev API 게이트웨이. 로컬 public API 개발은 Gateway-Service 기본 포트 8088을 사용한다. Workspace-Service 직접 개발/디버깅 포트는 8082이지만,
    이는 gateway 포트가 아니다.
- url: https://api.brainx.com
  description: 운영 API 게이트웨이
tags:
- name: Knowledge Intelligence
  description: 시맨틱 검색, RAG, AI 제안, 리포트 및 모델 설정
paths:
  /api/v1/intelligence/semantic-search:
    post:
      operationId: semanticSearch
      summary: 시맨틱 검색
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.home
        type: frontend
        description: 홈, 워크스페이스 동기화, 최근 활동 및 검색 UI
      x-produces-events:
      - SemanticSearchPerformed
      - TokenUsageRecordedRequested
      x-internal-sync-calls:
      - targetService: commerce-operations
        operationId: checkEntitlementsInternal
        reason: capability/quota must be decided synchronously before model call or job acceptance
        required: true
      x-async-boundary: false
      description: Intelligence는 원본 노트를 소유하지 않고 Workspace 이벤트 기반 read model/vector index를 조회한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticSearchRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/SemanticSearchData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
      - guestSessionAuth: []
  /api/v1/intelligence/note-index-statuses:
    post:
      operationId: getNoteIndexStatuses
      summary: 노트 검색 인덱스 상태 조회
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.graph
        type: frontend
        description: AI 연결/징검다리/분석 실행 전 선택 가능한 노트 상태 표시
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      description: 'Workspace 노트 목록/그래프에 Intelligence read model의 검색 인덱스 상태를 병합하기 위한 bulk 조회다. projection이 없거나 요청 범위에서 찾을
        수 없는 noteId는 NOT_INDEXED로 반환한다.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoteIndexStatusesRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/NoteIndexStatusesData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
  /api/v1/ai/inline-assists:
    post:
      operationId: createInlineAssist
      summary: AI 인라인 어시스트
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.note-editor
        type: frontend
        description: 마크다운/WYSIWYG 노트 편집기
      x-produces-events:
      - AiSuggestionCreated
      - TokenUsageRecordedRequested
      x-internal-sync-calls:
      - targetService: commerce-operations
        operationId: checkEntitlementsInternal
        reason: capability/quota must be decided synchronously before model call or job acceptance
        required: true
      x-async-boundary: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InlineAssistRequest'
      responses:
        '200':
          description: AI 인라인 어시스트 SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events 스트림. 이벤트는 줄 단위 text/event-stream 프레임으로 전달된다.
              examples:
                delta_done:
                  summary: 종료 이벤트가 포함된 델타 스트림
                  value: 'event: delta

                    data: {"text":"JWT는"}


                    event: done

                    data: {"suggestionId":"sug_01J...","action":"REWRITE","modelId":"gpt-5.4-mini","llmRunId":"run_01J..."}


                    '
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
      - guestSessionAuth: []
      x-streaming: sse
  /api/v1/ai/suggestions/{suggestionId}/decision:
    post:
      operationId: decideAiSuggestion
      summary: AI 제안 수락/거절/재생성 결정
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.note-editor
        type: frontend
        description: 마크다운/WYSIWYG 노트 편집기
      - id: web.graph
        type: frontend
        description: 2D/3D 그래프 및 마인드맵 UI
      x-produces-events:
      - AiSuggestionDecisionRecorded
      x-internal-sync-calls: []
      x-async-boundary: false
      description: v1은 Workspace patch 없이 Accepted/Rejected/Regenerated 결정을 AiSuggestionDecisionRecorded 이벤트로만 기록한다.
      parameters:
      - name: suggestionId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiSuggestionDecisionRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/AiSuggestionDecisionData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
      - guestSessionAuth: []
  /api/v1/ai/llm-feedback:
    put:
      operationId: upsertLlmFeedback
      summary: LLM 응답 사용자 피드백 등록/수정
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.chat
        type: frontend
        description: AI 응답 좋아요/싫어요 피드백 UI
      - id: web.note-editor
        type: frontend
        description: 인라인 AI 제안 피드백 UI
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      description: 같은 userId + llmRunId 조합은 upsert한다. llmRunId는 실제 provider 호출이 있는 생성형 AI 응답에만 제공된다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmFeedbackRequest'
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/LlmFeedbackData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: LLM run을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
      - guestSessionAuth: []
  /api/v1/ai/chat-threads:
    get:
      operationId: listChatThreads
      summary: AI 채팅 스레드 목록 조회
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.chat
        type: frontend
        description: RAG 챗봇 UI
      x-produces-events: []
      x-internal-sync-calls: []
      x-async-boundary: false
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
      - name: cursor
        in: query
        required: false
        schema:
          type: string
          description: 이전 응답의 nextCursor. 값은 opaque cursor로 취급한다.
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - active
          - archived
          default: active
          description: active는 보관/삭제되지 않은 스레드, archived는 보관되었지만 삭제되지 않은 스레드를 조회한다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/ChatThreadListData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
      - guestSessionAuth: []
    post:
      operationId: createChatThread
      summary: AI 채팅 스레드 생성
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.chat
        type: frontend
        description: RAG 챗봇 UI
      x-produces-events:
      - ChatThreadCreated
      x-internal-sync-calls: []
      x-async-boundary: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatThreadCreateRequest'
      responses:
        '201':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiSuccessBase'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/ChatThreadData'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: 충돌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
      - guestSessionAuth: []
  /api/v1/ai/chat-threads/{threadId}/messages:
    post:
      operationId: sendChatMessage
      summary: AI 채팅 메시지 전송
      tags:
      - Knowledge Intelligence
      x-producer-service: knowledge-intelligence
      x-visibility: public
      x-consumers:
      - id: web.chat
        type: frontend
        description: RAG 챗봇 UI
      x-produces-events:
      - ChatMessageCreated
      - TokenUsageRecordedRequested
      x-internal-sync-calls:
      - targetService: commerce-operations
        operationId: checkEntitlementsInternal
        reason: capability/quota must be decided synchronously before model call or job acceptance
        required: true
      x-async-boundary: false
      parameters:
      - name: threadId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequest'
      responses:
        '200':
          description: RAG 채팅 SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events 스트림. 이벤트는 줄 단위 text/event-stream 프레임으로 전달된다. 서버는 `status`, `route`, `web_search_progress`,
                  `web_sources`, `delta`, `done`, `error` 이벤트를 보낼 수 있으며, 웹 검색이 필요한 요청은 답변 전 `status.phase=WEB_SEARCHING`,
                  검색 진행 `web_search_progress`, 출처 `web_sources`, 답변 생성 `status.phase=ANSWERING` 이벤트를 보낼 수 있다. COMPOSE/NOTE_ACTION
                  초안 응답의 delta text는 첫 줄이 `# 제목`인 Markdown 문자열로 시작한다.
              examples:
                delta_done:
                  summary: status와 종료 이벤트가 포함된 델타 스트림
                  value: 'event: status

                    data: {"phase":"ROUTING","message":"Routing chat request.","requiresWebSearch":false,"webSearchQuery":""}


                    event: route

                    data: {"route":"NOTE_QA","reason":"note question","routerModel":"gpt-5.4-nano","requiresWebSearch":false,"webSearchQuery":""}


                    event: delta

                    data: {"text":"JWT는"}


                    event: done

                    data: {"messageId":"msg_01J...","llmRunId":"run_01J..."}


                    '
                web_search_status:
                  summary: 웹 검색 상태 이벤트가 포함된 스트림
                  value: 'event: status

                    data: {"phase":"ROUTING","message":"Routing chat request.","requiresWebSearch":false,"webSearchQuery":""}


                    event: route

                    data: {"route":"COMPOSE","reason":"current topic draft","routerModel":"gpt-5.4-nano","requiresWebSearch":true,"webSearchQuery":"latest
                    AI news"}


                    event: status

                    data: {"phase":"WEB_SEARCHING","message":"Searching the web.","requiresWebSearch":true,"webSearchQuery":"latest
                    AI news"}


                    event: web_search_progress

                    data: {"status":"started","actionType":"search","query":"latest AI news","message":"Web search search
                    started."}


                    event: web_sources

                    data: {"webSearchQuery":"latest AI news","sources":[{"title":"Example AI news","url":"https://example.com/ai-news","snippet":"Recent
                    AI news summary","rank":1}]}


                    event: status

                    data: {"phase":"ANSWERING","message":"Generating an answer.","requiresWebSearch":true,"webSearchQuery":"latest
                    AI news"}


                    event: delta

                    data: {"text":"# 최신 AI 뉴스\n\n"}


                    event: done

                    data: {"messageId":"msg_01J...","llmRunId":"run_01J..."}


                    '
                compose_draft:
                  summary: 제목 heading으로 시작하는 초안 델타 스트림
                  value: 'event: delta

                    data: {"text":"# RAG 학습 메모\n\n오늘 정리할 핵심은"}


                    event: done

                    data: {"messageId":"msg_01J...","llmRunId":"run_01J..."}


                    '
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 인증 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
      security:
      - bearerAuth: []
      - guestSessionAuth: []
      x-streaming: sse
  /api/v1/ai/chat-threads/{threadId}/messages/{messageId}/draft-note:
    put:
      operationId: recordChatMessageDraftNote
      summary: AI 채팅 메시지 초안 노트 저장 매핑 기록
