services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: brainx-kafka
    restart: unless-stopped
    environment:
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092,K8S://:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092,K8S://host.docker.internal:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,K8S:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:29092"
      - "9093:29093"
    volumes:
      - brainx_kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nc -z localhost 9092",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  discovery-service:
    profiles:
      - apps
    build:
      context: ./Discovery-Service
    container_name: brainx-discovery-service
    restart: unless-stopped
    environment:
      SERVER_PORT: "8761"
      EUREKA_SERVER_ENABLE_SELF_PRESERVATION: "false"
    ports:
      - "8761:8761"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8761/actuator/health | grep -q UP",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway-service:
    profiles:
      - apps
    build:
      context: ./Gateway-Service
    container_name: brainx-gateway-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/gateway-service.env
    environment:
      SERVER_PORT: "8088"
      SERVICE_TOKEN: ${SERVICE_TOKEN:-local-service-token}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: gateway-service
    ports:
      - "8088:8088"
    depends_on:
      discovery-service:
        condition: service_healthy
      user-service:
        condition: service_started
      workspace-service:
        condition: service_started
      ingestion-service:
        condition: service_started
      commerce-service:
        condition: service_started
      mcp-service:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8088/actuator/health | grep -q UP",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s

  user-service:
    profiles:
      - apps
    build:
      context: ./User-Service
    container_name: brainx-user-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/user-service.env
    environment:
      SERVER_PORT: "8080"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      WORKSPACE_SERVICE_BASE_URL: http://workspace-service:8082
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: user-service
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  workspace-service:
    profiles:
      - apps
    build:
      context: ./Workspace-Service
    container_name: brainx-workspace-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/workspace-service.env
    environment:
      SERVER_PORT: "8082"
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      NEO4J_URI: bolt://neo4j:7687
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: workspace-service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ingestion-service:
    profiles:
      - apps
    build:
      context: ./Ingestion-Service
    container_name: brainx-ingestion-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/ingestion-service.env
    environment:
      SERVER_PORT: "8083"
      POSTGRES_HOST: postgres
      # 공유 Postgres의 max_connections 예산을 넘지 않도록 Hikari pool을 낮게 고정한다.
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
      WORKSPACE_SERVICE_URL: http://workspace-service:8082
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: ingestion-service
    ports:
      - "8083:8083"
    volumes:
      # 자산(업로드/Notion 이미지 등)이 컨테이너 로컬 디스크(./asset-storage)에만 저장되는데
      # 영속 볼륨이 없으면 컨테이너를 재생성할 때마다 파일이 전부 사라지고 DB의 assets 행만
      # 남아 "이미지를 불러올 수 없습니다" 오류가 난다. 2026-07-06 재배포 때 실제로 겪은 문제.
      - brainx_ingestion_asset_storage:/app/asset-storage
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      workspace-service:
        condition: service_started

  commerce-service:
    profiles:
      - apps
    build:
      context: ./Commerce-Service
    container_name: brainx-commerce-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/commerce-service.env
    environment:
      SERVER_PORT: "8084"
      POSTGRES_HOST: postgres
      # 공유 Postgres의 max_connections 예산을 넘지 않도록 Hikari pool을 낮게 고정한다.
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: commerce-service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BRAINX_EVENTS_CONSUMER_ENABLED: "true"
      BRAINX_EVENTS_OUTBOX_ENABLED: "true"
    ports:
      - "8084:8084"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  intelligence-service:
    profiles:
      - apps
    build:
      context: ./Intelligence-Service
    container_name: brainx-intelligence-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/intelligence-service.env
    environment:
      SERVER_PORT: "8086"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${INTELLIGENCE_DB_NAME:-intelligence_service}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JPA_DDL_AUTO: validate
      # 공유 Postgres의 max_connections 예산을 넘지 않도록 Hikari pool을 낮게 고정한다.
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
      JWT_SECRET: ${JWT_SECRET:-replace_with_at_least_32_byte_secret}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-local-service-token}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5.4-mini}
      OPENAI_WEB_SEARCH_MODEL: ${OPENAI_WEB_SEARCH_MODEL:-gpt-5.5}
      BRAINX_EXTERNAL_SEARCH_PROVIDER: ${BRAINX_EXTERNAL_SEARCH_PROVIDER:-openai}
      BRAINX_EXTERNAL_SEARCH_TIMEOUT: ${BRAINX_EXTERNAL_SEARCH_TIMEOUT:-60s}
      BRAINX_EXTERNAL_SEARCH_CONTEXT_SIZE: ${BRAINX_EXTERNAL_SEARCH_CONTEXT_SIZE:-low}
      BRAINX_AI_EMBEDDING_PROVIDER: ${BRAINX_AI_EMBEDDING_PROVIDER:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      VOYAGE_EMBEDDING_MODEL: ${VOYAGE_EMBEDDING_MODEL:-voyage-4-lite}
      VOYAGE_EMBEDDING_DIMENSIONS: ${VOYAGE_EMBEDDING_DIMENSIONS:-1024}
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: "6334"
      QDRANT_COLLECTION: brainx_note_search
      BRAINX_VECTOR_QDRANT_ENABLED: "true"
      BRAINX_REPAIR_LEGACY_DEFAULT_DOCUMENT_GROUP_BACKFILL_ENABLED: ${BRAINX_REPAIR_LEGACY_DEFAULT_DOCUMENT_GROUP_BACKFILL_ENABLED:-false}
      BRAINX_WORKSPACE_BASE_URL: http://workspace-service:8082
      BRAINX_WORKSPACE_SERVICE_TOKEN: ${SERVICE_TOKEN:-local-service-token}
      BRAINX_COMMERCE_BASE_URL: http://commerce-service:8084
      BRAINX_COMMERCE_SERVICE_TOKEN: ${SERVICE_TOKEN:-local-service-token}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TIMEOUT: 2s
      BRAINX_REDIS_HEALTH_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BRAINX_EVENTS_CONSUMER_ENABLED: "true"
      BRAINX_EVENTS_PRODUCER_ENABLED: "true"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: intelligence-service
    ports:
      - "8086:8086"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres-service-databases:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      workspace-service:
        condition: service_started
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8086/actuator/health | grep -q UP",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 240s

  admin-service:
    profiles:
      - apps
    build:
      context: ./Admin-Service
    container_name: brainx-admin-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/admin-service.env
    environment:
      SERVER_PORT: "8085"
      POSTGRES_HOST: postgres
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-brainx_admin}
      GATEWAY_SERVICE_URL: http://Gateway-Service
      USER_SERVICE_URL: http://User-Service
      COMMERCE_SERVICE_URL: http://Commerce-Service
      WORKSPACE_SERVICE_URL: http://Workspace-Service
      INGESTION_SERVICE_URL: http://Ingestion-Service
      INTELLIGENCE_SERVICE_URL: http://intelligence-service:8086
      MCP_SERVICE_URL: http://Mcp-Service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BRAINX_KAFKA_MONITORING_CONSUMER_GROUP_ID: intelligence-service
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: admin-service
    ports:
      - "8085:8085"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      gateway-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8085/actuator/health | grep -q UP",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mcp-service:
    profiles:
      - apps
    build:
      context: ./Mcp-Service
    container_name: brainx-mcp-service
    restart: unless-stopped
    env_file:
      - ./.env
      - ./env/mcp-service.env
    environment:
      SERVER_PORT: "8087"
      POSTGRES_HOST: postgres
      MCP_DB_NAME: ${MCP_DB_NAME:-brainx_mcp}
      JWT_SECRET: ${JWT_SECRET:-replace_with_at_least_32_byte_secret}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_INSTANCE_HOSTNAME: mcp-service
      SERVICE_TOKEN: ${SERVICE_TOKEN:-local-service-token}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      BRAINX_OAUTH_ISSUER: ${BRAINX_OAUTH_ISSUER:-http://localhost:3000}
      BRAINX_MCP_RESOURCE: ${BRAINX_MCP_RESOURCE:-http://localhost:3000/mcp}
      WORKSPACE_SERVICE_URL: http://workspace-service:8082
      INTELLIGENCE_SERVICE_URL: http://intelligence-service:8086
    ports:
      - "8087:8087"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres-service-databases:
        condition: service_completed_successfully
      workspace-service:
        condition: service_started
      intelligence-service:
        condition: service_started

  postgres-service-databases:
    profiles:
      - apps
    image: postgres:16-alpine
    container_name: brainx-postgres-service-databases
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${USER_DB_NAME:-brainx_user}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      PGPASSWORD: ${POSTGRES_PASSWORD:-1234}
      USER_DB_NAME: ${USER_DB_NAME:-brainx_user}
      WORKSPACE_DB_NAME: ${WORKSPACE_DB_NAME:-brainx_workspace}
      INGESTION_DB_NAME: ${INGESTION_DB_NAME:-brainx_ingestion}
      COMMERCE_DB_NAME: ${COMMERCE_DB_NAME:-brainx_commerce}
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-brainx_admin}
      INTELLIGENCE_DB_NAME: ${INTELLIGENCE_DB_NAME:-intelligence_service}
      MCP_DB_NAME: ${MCP_DB_NAME:-brainx_mcp}
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      ["sh", "/docker-entrypoint-initdb.d/01-create-service-databases.sh"]

  postgres:
    image: postgres:16-alpine
    container_name: brainx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME:-brainx_user}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      USER_DB_NAME: ${USER_DB_NAME:-brainx_user}
      WORKSPACE_DB_NAME: ${WORKSPACE_DB_NAME:-brainx_workspace}
      INGESTION_DB_NAME: ${INGESTION_DB_NAME:-brainx_ingestion}
      COMMERCE_DB_NAME: ${COMMERCE_DB_NAME:-brainx_commerce}
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-brainx_admin}
      MCP_DB_NAME: ${MCP_DB_NAME:-brainx_mcp}
    # max_connections를 100(이미지 기본값)에서 200으로 올려 여유를 확보한다.
    # User/Workspace/Admin/MCP(K8s) + Ingestion/Commerce/Intelligence(Compose)가
    # 같은 Postgres를 공유하고, K8s rolling update 중에는 이전 Pod와 새 Pod가
    # 일시적으로 동시에 커넥션을 잡는다. 근본 대책은 서비스별 Hikari pool 상한
    # 고정이며(각 서비스 environment의 SPRING_DATASOURCE_HIKARI_* 참고), 이 값은
    # 그 위에 얹는 보조 안전 마진이다. 운영 환경에서는 이 값을 계속 올리는 대신
    # PgBouncer 등 connection pooler 도입을 검토한다(k8s/TROUBLESHOOTING.md 참고).
    command: ["postgres", "-c", "max_connections=200"]
    ports:
      - "5432:5432"
    volumes:
      - brainx_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brainx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    container_name: brainx-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-brainx_neo4j_local_password}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL_SIZE:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX_SIZE:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-512m}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - brainx_neo4j_data:/data
      - brainx_neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/var/lib/neo4j/bin/cypher-shell --non-interactive -u ${NEO4J_USERNAME:-neo4j} -p ${NEO4J_PASSWORD:-brainx_neo4j_local_password} 'RETURN 1' | grep -q 1",
        ]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: brainx-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - brainx_qdrant_data:/qdrant/storage

volumes:
  brainx_kafka_data:
  brainx_postgres_data:
  brainx_neo4j_data:
  brainx_neo4j_logs:
  brainx_qdrant_data:
  brainx_ingestion_asset_storage:
