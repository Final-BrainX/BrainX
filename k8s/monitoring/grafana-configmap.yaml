apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: brainx
  labels:
    app: grafana
data:
  prometheus-datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: brainx-prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: BrainX
        orgId: 1
        folder: BrainX
        type: file
        disableDeletion: true
        editable: false
        allowUiUpdates: false
        options:
          path: /etc/grafana/dashboards
