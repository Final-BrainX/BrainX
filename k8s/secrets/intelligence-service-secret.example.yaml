apiVersion: v1
kind: Secret
metadata:
  name: intelligence-service-secret
  namespace: brainx
type: Opaque
stringData:
  # OpenAI API key. Inline assist, chat, search, clustering, insight generation이 사용한다.
  OPENAI_API_KEY: CHANGE_ME
  # 로컬 Compose Qdrant는 기본적으로 인증을 쓰지 않으므로 비워 둘 수 있다.
  QDRANT_API_KEY: ""
