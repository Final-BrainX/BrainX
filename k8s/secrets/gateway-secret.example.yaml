apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
  namespace: brainx
type: Opaque
stringData:
  SERVICE_TOKEN: CHANGE_ME
  # Gateway-Service와 User-Service가 함께 검증에 쓰는 공유 JWT 서명 시크릿.
  # Workspace/Admin/MCP의 JWT_SECRET(workspace-secret, admin-service-secret,
  # mcp-service-secret)과 반드시 같은 값이어야 한다.
  JWT_SECRET: CHANGE_ME_AT_LEAST_32_BYTE_SECRET
