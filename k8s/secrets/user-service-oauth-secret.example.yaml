apiVersion: v1
kind: Secret
metadata:
  name: user-service-oauth-secret
  namespace: brainx
type: Opaque
stringData:
  # 소셜 로그인(Google/Kakao/Naver) 검증용. optional Secret이라 로컬에서 소셜
  # 로그인을 테스트하지 않으면 이 Secret 자체를 만들지 않아도 다른 서비스 기동에는
  # 영향이 없다. 실제로 소셜 로그인을 검증하려면 각 Provider Console에서 발급한
  # 값으로 채우고, Redirect URI도 K8s Pod가 노출되는 실제 콜백 주소로 맞춰야 한다.
  GOOGLE_CLIENT_ID: CHANGE_ME
  GOOGLE_CLIENT_SECRET: CHANGE_ME
  GOOGLE_REDIRECT_URI: CHANGE_ME
  KAKAO_CLIENT_ID: CHANGE_ME
  KAKAO_CLIENT_SECRET: CHANGE_ME
  KAKAO_REDIRECT_URI: CHANGE_ME
  NAVER_CLIENT_ID: CHANGE_ME
  NAVER_CLIENT_SECRET: CHANGE_ME
  NAVER_REDIRECT_URI: CHANGE_ME
