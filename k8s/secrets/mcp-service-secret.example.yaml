apiVersion: v1
kind: Secret
metadata:
  name: mcp-service-secret
  namespace: brainx
type: Opaque
stringData:
  # Must match the shared JWT secret used by User-Service, Workspace-Service,
  # Admin-Service, Mcp-Service, and any other token-verifying service.
  JWT_SECRET: CHANGE_ME_TO_SHARED_JWT_SECRET
