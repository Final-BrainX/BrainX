apiVersion: v1
kind: Secret
metadata:
  name: commerce-service-secret
  namespace: brainx
type: Opaque
stringData:
  # 32바이트 이상 실제 JWT 서명 시크릿. Gateway/User/Workspace/Admin/MCP와 같은 값을 사용한다.
  JWT_SECRET: CHANGE_ME_AT_LEAST_32_BYTE_SECRET
  # Toss Payments 공개 client key. 테스트 환경이면 테스트 키를 넣는다.
  TOSS_CLIENT_KEY: CHANGE_ME
  # Toss Payments secret key. 실제 파일에만 넣고 커밋하지 않는다.
  TOSS_SECRET_KEY: CHANGE_ME
