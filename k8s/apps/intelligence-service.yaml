apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelligence-service
  namespace: brainx
  labels:
    app: intelligence-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: intelligence-service
  template:
    metadata:
      labels:
        app: intelligence-service
    spec:
      containers:
        - name: intelligence-service
          image: brainx-intelligence-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
              name: http
          envFrom:
            - configMapRef:
                name: intelligence-service-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: SERVICE_TOKEN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: JWT_SECRET
            - name: BRAINX_WORKSPACE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: SERVICE_TOKEN
            - name: BRAINX_COMMERCE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: SERVICE_TOKEN
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: intelligence-service-secret
                  key: OPENAI_API_KEY
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: intelligence-service-secret
                  key: VOYAGE_API_KEY
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: intelligence-service-secret
                  key: QDRANT_API_KEY
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: intelligence-service
  namespace: brainx
  labels:
    app: intelligence-service
spec:
  type: ClusterIP
  selector:
    app: intelligence-service
  ports:
    - name: http
      port: 8086
      targetPort: http
