apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-service-config
  namespace: brainx
  labels:
    app: ingestion-service
data:
  SERVER_PORT: "8083"
  POSTGRES_HOST: host.docker.internal
  POSTGRES_PORT: "5432"
  INGESTION_DB_NAME: brainx_ingestion
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
  WORKSPACE_SERVICE_URL: http://host.docker.internal:8082
  SPRING_KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
  EUREKA_INSTANCE_HOSTNAME: ingestion-service
  CDN_BASE_URL: https://cdn.brainx.com
  ASSET_STORAGE_DIR: /app/asset-storage
  ASSET_MAX_SIZE_BYTES: "5368709120"
  NOTION_REDIRECT_URI: http://localhost:3000/notion-callback
  BRAINX_EVENTS_PRODUCER_ENABLED: "false"
