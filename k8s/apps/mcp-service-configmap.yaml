apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-service-config
  namespace: brainx
data:
  SERVER_PORT: "8087"
  POSTGRES_HOST: host.docker.internal
  POSTGRES_PORT: "5432"
  MCP_DB_NAME: brainx_mcp
  # Hikari pool 상한. 로컬 Compose Postgres의 max_connections 한도를
  # 여러 서비스(Admin/User/Workspace/MCP)가 공유하므로 서비스당 낮게 고정한다.
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "3"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
  EUREKA_INSTANCE_HOSTNAME: mcp-service
  # Docker Desktop 로컬 검증 기준 공개 origin.
  # User-Service MCP OAuth 설정과 같은 origin/resource를 써야 토큰 iss/resource 검증이 맞는다.
  # 비로컬/실운영 apply 전에는 아래 4개 값을 동일한 실제 공개 origin으로 함께 교체해야 한다.
  PUBLIC_BASE_URL: http://localhost:3000
  BRAINX_OAUTH_ISSUER: http://localhost:3000
  BRAINX_MCP_RESOURCE: http://localhost:3000/mcp
  BRAINX_MCP_PROTECTED_RESOURCE_METADATA_URL: http://localhost:3000/.well-known/oauth-protected-resource
  WORKSPACE_SERVICE_URL: http://host.docker.internal:8082
  INTELLIGENCE_SERVICE_URL: http://host.docker.internal:8086
  WORKSPACE_SERVICE_TIMEOUT: 5s
  INTELLIGENCE_SERVICE_TIMEOUT: 10s
  BRAINX_MCP_API_KEY_PREFIX: bxk_live_
