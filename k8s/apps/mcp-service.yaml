apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-service
  namespace: brainx
  labels:
    app: mcp-service
spec:
  replicas: 1
  # 로컬 검증 전용: old/new Pod가 동시에 Postgres 커넥션을 잡아 too many clients가
  # 나는 것을 줄이기 위해 surge 없이(maxSurge: 0) old Pod를 먼저 내리고 새 Pod를 올린다.
  # 자세한 배경은 k8s/TROUBLESHOOTING.md 9번 항목 참고.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: mcp-service
  template:
    metadata:
      labels:
        app: mcp-service
    spec:
      containers:
        - name: mcp-service
          image: brainx-mcp-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
              name: http
          envFrom:
            - configMapRef:
                name: mcp-service-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-secret
                  key: SERVICE_TOKEN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mcp-service-secret
                  key: JWT_SECRET
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-service
  namespace: brainx
  labels:
    app: mcp-service
spec:
  type: ClusterIP
  selector:
    app: mcp-service
  ports:
    - name: http
      port: 8087
      targetPort: http
