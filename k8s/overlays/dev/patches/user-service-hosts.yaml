# Deployment patch (user-serviceлҠ” ConfigMap м—Ҷмқҙ inline envлҘј м“ҙлӢӨ).
# POSTGRES_HOST/REDIS_HOSTлҠ” мқён”„лқј placeholder, WORKSPACE_SERVICE_BASE_URLмқҖ
# in-cluster Service DNSлЎң л°”кҫјлӢӨ. нҸ¬нҠёлҠ” мӣҗліёкіј лҸҷмқјн•ҳкІҢ мң м§Җн•ңлӢӨ.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: brainx
spec:
  template:
    spec:
      containers:
        - name: user-service
          env:
            - name: POSTGRES_HOST
              value: postgres.internal
            - name: REDIS_HOST
              value: redis.internal
            - name: WORKSPACE_SERVICE_BASE_URL
              value: http://workspace-service:8082
