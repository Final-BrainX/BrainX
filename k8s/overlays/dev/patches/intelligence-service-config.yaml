# ConfigMap patch (intelligence-service-config). DeploymentлҠ” кұҙл“ңлҰ¬м§Җ м•ҠлҠ”лӢӨ.
# BRAINX_WORKSPACE_BASE_URLмқҖ baseм—җ мқҙлҜё http://workspace-service:8082лЎң in-cluster
# м „нҷҳлҗҳм–ҙ мһҲм–ҙ patch лҢҖмғҒмқҙ м•„лӢҲлӢӨ. BRAINX_COMMERCE_BASE_URLлҸ„ лҸҷмқјн•ң мӣҗм№ҷмңјлЎң Service DNSнҷ”н•ңлӢӨ.
apiVersion: v1
kind: ConfigMap
metadata:
  name: intelligence-service-config
  namespace: brainx
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres.internal:5432/intelligence_service
  REDIS_HOST: redis.internal
  KAFKA_BOOTSTRAP_SERVERS: kafka.internal:9093
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka.internal:9093
  QDRANT_HOST: qdrant.internal
  BRAINX_COMMERCE_BASE_URL: http://commerce-service:8084
