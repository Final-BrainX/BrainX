# ConfigMap patch (admin-service-config). Deployment는 건드리지 않는다.
# POSTGRES_HOST/SPRING_KAFKA_BOOTSTRAP_SERVERS는 인프라 placeholder.
# 나머지 서비스 URL 7개는 전부 in-cluster Service이므로 Service DNS로 치환한다(포트 유지).
apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-service-config
  namespace: brainx
data:
  POSTGRES_HOST: postgres.internal
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka.internal:9093
  GATEWAY_SERVICE_URL: http://gateway-service:8088
  USER_SERVICE_URL: http://user-service:8080
  COMMERCE_SERVICE_URL: http://commerce-service:8084
  WORKSPACE_SERVICE_URL: http://workspace-service:8082
  INGESTION_SERVICE_URL: http://ingestion-service:8083
  INTELLIGENCE_SERVICE_URL: http://intelligence-service:8086
  MCP_SERVICE_URL: http://mcp-service:8087
