# ConfigMap patch (mcp-service-config). Deployment는 건드리지 않는다.
# PUBLIC_BASE_URL/BRAINX_OAUTH_ISSUER 등 공개 origin 4종은 이번 patch 범위 밖(별도 결정 필요).
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-service-config
  namespace: brainx
data:
  POSTGRES_HOST: postgres.internal
  WORKSPACE_SERVICE_URL: http://workspace-service:8082
  INTELLIGENCE_SERVICE_URL: http://intelligence-service:8086
