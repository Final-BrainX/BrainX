# ConfigMap patch (workspace-service-config). Deployment는 건드리지 않는다.
# 인프라(Postgres/Redis/Neo4j/Kafka) 값만 EC2 placeholder로 치환한다. 포트는 유지.
apiVersion: v1
kind: ConfigMap
metadata:
  name: workspace-service-config
  namespace: brainx
data:
  POSTGRES_HOST: postgres.internal
  REDIS_HOST: redis.internal
  NEO4J_URI: bolt://neo4j.internal:7687
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka.internal:9093
