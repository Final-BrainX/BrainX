# dev overlay 전용 Ingress. k3s 기본 Traefik Ingress Controller를 통해
# gateway-service를 EC2 외부에 노출한다 (port 80).
# base manifest(k8s/apps/gateway-service.yaml)의 Service type(ClusterIP)은 변경하지 않는다.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: brainx
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8088
