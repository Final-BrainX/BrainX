name: BrainX Dev Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_all:
        description: "Build and deploy all BrainX services"
        required: false
        default: false
        type: boolean
      force_runtime_refresh:
        description: "Force-recreate runtime-secret dependent services without rebuilding images"
        required: false
        default: false
        type: boolean
      build_desktop_installer:
        description: "Build and upload the Windows desktop installer before frontend image build"
        required: false
        default: false
        type: boolean
      services:
        description: "Optional space/comma-separated service list"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: brainx-dev-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  AWS_DEV_INSTANCE_ID: ${{ vars.AWS_DEV_INSTANCE_ID }}
  AWS_DEV_ARTIFACT_BUCKET: ${{ vars.AWS_DEV_ARTIFACT_BUCKET }}
  AWS_DEV_ASSET_BUCKET: ${{ vars.AWS_DEV_ASSET_BUCKET }}
  AWS_ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
  AWS_DEV_RDS_SECRET_ARN: ${{ vars.AWS_DEV_RDS_SECRET_ARN }}
  AWS_DEV_RDS_HOST: ${{ vars.AWS_DEV_RDS_HOST }}
  AWS_DEV_RDS_PORT: ${{ vars.AWS_DEV_RDS_PORT }}
  AWS_DEV_SSM_PARAMETER_PREFIX: ${{ vars.AWS_DEV_SSM_PARAMETER_PREFIX }}
  AWS_DEV_PUBLIC_BASE_URL: ${{ vars.AWS_DEV_PUBLIC_BASE_URL }}
  AWS_DEV_ADMIN_PUBLIC_BASE_URL: ${{ vars.AWS_DEV_ADMIN_PUBLIC_BASE_URL }}
  AWS_DEV_PUBLIC_SITE_ADDRESS: ${{ vars.AWS_DEV_PUBLIC_SITE_ADDRESS }}
  AWS_DEV_ADMIN_SITE_ADDRESS: ${{ vars.AWS_DEV_ADMIN_SITE_ADDRESS }}
  AWS_DEV_ACME_EMAIL: ${{ vars.AWS_DEV_ACME_EMAIL }}
  AWS_DEV_DESKTOP_INSTALLER_KEY: desktop-installers/latest/BrainX Setup 0.1.0.exe
  IMAGE_TAG: ${{ github.sha }}

jobs:
  preflight:
    name: Check deployment configuration
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            AWS_REGION \
            AWS_ROLE_TO_ASSUME \
            AWS_DEV_INSTANCE_ID \
            AWS_DEV_ARTIFACT_BUCKET \
            AWS_DEV_ASSET_BUCKET \
            AWS_ECR_REGISTRY \
            AWS_DEV_RDS_SECRET_ARN \
            AWS_DEV_RDS_HOST \
            AWS_DEV_RDS_PORT \
            AWS_DEV_SSM_PARAMETER_PREFIX \
            AWS_DEV_PUBLIC_BASE_URL \
            AWS_DEV_ADMIN_PUBLIC_BASE_URL \
            AWS_DEV_PUBLIC_SITE_ADDRESS \
            AWS_DEV_ADMIN_SITE_ADDRESS; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Deployment is not configured yet. Missing GitHub repository variables:"
            printf ' - %s\n' "${missing[@]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "Deployment configuration variables are present."
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    outputs:
      services_json: ${{ steps.detect.outputs.services_json }}
      services_space: ${{ steps.detect.outputs.services_space }}
      should_deploy: ${{ steps.detect.outputs.should_deploy }}
      deploy_config_changed: ${{ steps.detect.outputs.deploy_config_changed }}
      desktop_installer_changed: ${{ steps.detect.outputs.desktop_installer_changed }}
      force_runtime_refresh: ${{ steps.detect.outputs.force_runtime_refresh }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(
            --base "${{ github.event.before }}"
            --head "${{ github.sha }}"
          )

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.deploy_all }}" = "true" ]; then
            ARGS+=(--deploy-all)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_runtime_refresh }}" = "true" ]; then
            ARGS+=(--force-runtime-refresh)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.build_desktop_installer }}" = "true" ]; then
            ARGS+=(--build-desktop-installer)
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.services }}" ]; then
            ARGS+=(--services "${{ inputs.services }}")
          fi

          python infra/aws-dev/scripts/detect_changed_services.py "${ARGS[@]}" > detection.json
          cat detection.json

          python - <<'PY'
          import json
          import os

          with open("detection.json", "r", encoding="utf-8") as fp:
              detection = json.load(fp)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fp:
              fp.write(f"services_json={detection['servicesJson']}\n")
              fp.write(f"services_space={detection['servicesSpace']}\n")
              fp.write(f"should_deploy={str(detection['shouldDeploy']).lower()}\n")
              fp.write(f"deploy_config_changed={str(detection['deployConfigChanged']).lower()}\n")
              fp.write(f"desktop_installer_changed={str(detection['desktopInstallerChanged']).lower()}\n")
              fp.write(f"force_runtime_refresh={str(detection['forceRuntimeRefresh']).lower()}\n")
          PY

  desktop-installer:
    name: Build and upload desktop installer
    runs-on: windows-latest
    needs: detect
    if: needs.detect.outputs.should_deploy == 'true' && contains(needs.detect.outputs.services_json, '"frontend"') && needs.detect.outputs.desktop_installer_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Install renderer dependencies
        working-directory: brainx-next
        shell: pwsh
        run: npm ci

      - name: Install desktop dependencies
        working-directory: brainx-electron
        shell: pwsh
        run: npm ci

      - name: Build Windows installer
        working-directory: brainx-electron
        shell: pwsh
        run: npm run dist:win

      - name: Upload installer to S3
        shell: pwsh
        run: |
          $installerPath = Join-Path $env:GITHUB_WORKSPACE 'brainx-electron\release\BrainX Setup 0.1.0.exe'
          if (!(Test-Path $installerPath)) {
            throw "Desktop installer not found at $installerPath"
          }

          $versionedKey = "desktop-installers/$env:GITHUB_SHA/BrainX Setup 0.1.0.exe"
          aws s3 cp $installerPath "s3://$env:AWS_DEV_ASSET_BUCKET/$versionedKey" --region $env:AWS_REGION
          aws s3 cp $installerPath "s3://$env:AWS_DEV_ASSET_BUCKET/$env:AWS_DEV_DESKTOP_INSTALLER_KEY" --region $env:AWS_REGION

  build:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs:
      - detect
      - desktop-installer
    if: always() && needs.detect.outputs.services_space != '' && (needs.desktop-installer.result == 'success' || needs.desktop-installer.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services_json) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sync desktop installer from S3
        if: matrix.service == 'frontend'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "brainx-next/public/downloads"
          aws s3 cp \
            "s3://$AWS_DEV_ASSET_BUCKET/$AWS_DEV_DESKTOP_INSTALLER_KEY" \
            "brainx-next/public/downloads/BrainX Setup 0.1.0.exe" \
            --region "$AWS_REGION"
          ls -lh "brainx-next/public/downloads/BrainX Setup 0.1.0.exe"

      - name: Build and push image
        shell: bash
        env:
          SERVICE: ${{ matrix.service }}
          PUBLIC_BASE_URL: ${{ env.AWS_DEV_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail

          case "$SERVICE" in
            discovery-service)
              CONTEXT="brainX_back/Discovery-Service"
              DOCKERFILE="brainX_back/Discovery-Service/Dockerfile"
              ;;
            gateway-service)
              CONTEXT="brainX_back/Gateway-Service"
              DOCKERFILE="brainX_back/Gateway-Service/Dockerfile"
              ;;
            user-service)
              CONTEXT="brainX_back/User-Service"
              DOCKERFILE="brainX_back/User-Service/Dockerfile"
              ;;
            workspace-service)
              CONTEXT="brainX_back/Workspace-Service"
              DOCKERFILE="brainX_back/Workspace-Service/Dockerfile"
              ;;
            ingestion-service)
              CONTEXT="brainX_back/Ingestion-Service"
              DOCKERFILE="brainX_back/Ingestion-Service/Dockerfile"
              ;;
            commerce-service)
              CONTEXT="brainX_back/Commerce-Service"
              DOCKERFILE="brainX_back/Commerce-Service/Dockerfile"
              ;;
            admin-service)
              CONTEXT="brainX_back/Admin-Service"
              DOCKERFILE="brainX_back/Admin-Service/Dockerfile"
              ;;
            intelligence-service)
              CONTEXT="brainX_back/Intelligence-Service"
              DOCKERFILE="infra/aws-dev/dockerfiles/intelligence-service.Dockerfile"
              ;;
            mcp-service)
              CONTEXT="brainX_back/Mcp-Service"
              DOCKERFILE="brainX_back/Mcp-Service/Dockerfile"
              ;;
            frontend)
              CONTEXT="."
              DOCKERFILE="infra/aws-dev/dockerfiles/brainx-next.Dockerfile"
              ;;
            admin-frontend)
              CONTEXT="brainx-admin-next"
              DOCKERFILE="infra/aws-dev/dockerfiles/brainx-admin-next.Dockerfile"
              ;;
            *)
              echo "Unknown service: $SERVICE" >&2
              exit 1
              ;;
          esac

          IMAGE_URI="$AWS_ECR_REGISTRY/brainx-dev-$SERVICE"
          BUILD_ARGS=()
          if [ "$SERVICE" = "frontend" ]; then
            BUILD_ARGS+=(
              --build-arg "NEXT_PUBLIC_API_BASE_URL=$PUBLIC_BASE_URL"
              --build-arg "NEXT_PUBLIC_WORKSPACE_API_BASE_URL=$PUBLIC_BASE_URL"
              --build-arg "NEXT_PUBLIC_COMMERCE_API_BASE_URL=$PUBLIC_BASE_URL"
              --build-arg "NEXT_PUBLIC_INGESTION_API_BASE_URL=$PUBLIC_BASE_URL"
              --build-arg "NEXT_PUBLIC_NOTES_USE_MOCK=false"
              --build-arg "NEXT_PUBLIC_GRAPH_USE_MOCK=false"
              --build-arg "NEXT_PUBLIC_GRAPH_CLUSTERS_USE_MOCK=false"
              --build-arg "API_SERVER_URL=http://gateway-service:8088"
            )
          fi

          CACHE_SCOPE="brainx-dev-$SERVICE"

          REPO_NAME="brainx-dev-$SERVICE"
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Missing or inaccessible ECR repository: $REPO_NAME" >&2
            echo "Run terraform apply in infra/aws-dev/terraform first so the repo and GitHub Actions ECR policy are created." >&2
            exit 1
          fi

          docker buildx build \
            --progress=plain \
            --push \
            -f "$DOCKERFILE" \
            -t "$IMAGE_URI:$IMAGE_TAG" \
            -t "$IMAGE_URI:dev-latest" \
            --cache-from "type=gha,scope=$CACHE_SCOPE" \
            --cache-to "type=gha,mode=max,scope=$CACHE_SCOPE" \
            "${BUILD_ARGS[@]}" \
            "$CONTEXT"

  deploy:
    name: Deploy changed services
    runs-on: ubuntu-latest
    needs:
      - detect
      - build
    if: always() && needs.detect.outputs.should_deploy == 'true' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Upload deploy bundle
        shell: bash
        run: |
          set -euo pipefail
          tar -czf brainx-deploy-bundle.tgz -C infra/aws-dev deploy scripts
          ARTIFACT_KEY="deploy/${GITHUB_SHA}/brainx-deploy-bundle.tgz"
          aws s3 cp brainx-deploy-bundle.tgz "s3://$AWS_DEV_ARTIFACT_BUCKET/$ARTIFACT_KEY"
          echo "ARTIFACT_KEY=$ARTIFACT_KEY" >> "$GITHUB_ENV"

      - name: Run remote deploy through SSM
        shell: bash
        env:
          CHANGED_SERVICES: ${{ needs.detect.outputs.services_space }}
          DEPLOY_CONFIG_CHANGED: ${{ needs.detect.outputs.deploy_config_changed }}
          FORCE_RUNTIME_REFRESH: ${{ needs.detect.outputs.force_runtime_refresh }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os

          exports = {
              "AWS_REGION": os.environ["AWS_REGION"],
              "ECR_REGISTRY": os.environ["AWS_ECR_REGISTRY"],
              "IMAGE_TAG": os.environ["IMAGE_TAG"],
              "RDS_SECRET_ARN": os.environ["AWS_DEV_RDS_SECRET_ARN"],
              "RDS_HOST": os.environ["AWS_DEV_RDS_HOST"],
              "RDS_PORT": os.environ["AWS_DEV_RDS_PORT"],
              "SSM_PARAMETER_PREFIX": os.environ["AWS_DEV_SSM_PARAMETER_PREFIX"],
              "PUBLIC_BASE_URL": os.environ["AWS_DEV_PUBLIC_BASE_URL"],
              "ADMIN_PUBLIC_BASE_URL": os.environ["AWS_DEV_ADMIN_PUBLIC_BASE_URL"],
              "PUBLIC_SITE_ADDRESS": os.environ["AWS_DEV_PUBLIC_SITE_ADDRESS"],
              "ADMIN_SITE_ADDRESS": os.environ["AWS_DEV_ADMIN_SITE_ADDRESS"],
              "ACME_EMAIL": os.environ.get("AWS_DEV_ACME_EMAIL", ""),
              "ARTIFACT_BUCKET": os.environ["AWS_DEV_ARTIFACT_BUCKET"],
              "ARTIFACT_KEY": os.environ["ARTIFACT_KEY"],
              "ASSET_BUCKET": os.environ.get("AWS_DEV_ASSET_BUCKET", ""),
              "CHANGED_SERVICES": os.environ.get("CHANGED_SERVICES", ""),
              "DEPLOY_CONFIG_CHANGED": os.environ.get("DEPLOY_CONFIG_CHANGED", "false"),
              "FORCE_RUNTIME_REFRESH": os.environ.get("FORCE_RUNTIME_REFRESH", "false"),
          }

          commands = [
              "set -eu",
              "rm -rf /tmp/brainx-deploy-bundle /tmp/brainx-deploy-bundle.tgz",
              "mkdir -p /tmp/brainx-deploy-bundle",
              f"aws s3 cp s3://{exports['ARTIFACT_BUCKET']}/{exports['ARTIFACT_KEY']} /tmp/brainx-deploy-bundle.tgz --region {exports['AWS_REGION']}",
              "tar -xzf /tmp/brainx-deploy-bundle.tgz -C /tmp/brainx-deploy-bundle",
          ]
          for key, value in exports.items():
              commands.append(f"export {key}={json.dumps(value)}")
          commands.append("bash /tmp/brainx-deploy-bundle/scripts/deploy_remote.sh")

          with open("ssm-parameters.json", "w", encoding="utf-8") as fp:
              json.dump({"commands": commands, "executionTimeout": ["3600"]}, fp)
          PY

          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "$AWS_DEV_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters file://ssm-parameters.json \
              --query "Command.CommandId" \
              --output text
          )"

          MAX_ATTEMPTS=240
          SLEEP_SECONDS=15
          FINAL_STATUS=""

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            set +e
            CURRENT_STATUS="$(
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$AWS_DEV_INSTANCE_ID" \
                --query 'Status' \
                --output text 2>/dev/null
            )"
            STATUS_CODE=$?
            set -e

            if [ "$STATUS_CODE" -ne 0 ] || [ -z "$CURRENT_STATUS" ] || [ "$CURRENT_STATUS" = "None" ]; then
              echo "Waiting for SSM command to become visible... ($attempt/$MAX_ATTEMPTS)"
            else
              echo "SSM command status: $CURRENT_STATUS ($attempt/$MAX_ATTEMPTS)"
              case "$CURRENT_STATUS" in
                Success|Cancelled|TimedOut|Failed|Cancelling)
                  FINAL_STATUS="$CURRENT_STATUS"
                  break
                  ;;
              esac
            fi

            sleep "$SLEEP_SECONDS"
          done

          if [ -z "$FINAL_STATUS" ]; then
            echo "SSM command did not reach a terminal state within $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds." >&2
            exit 1
          fi

          set +e
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$AWS_DEV_INSTANCE_ID" \
            --query '{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output text
          INVOCATION_STATUS=$?
          set -e

          if [ "$INVOCATION_STATUS" -ne 0 ]; then
            echo "Failed to fetch final SSM command output." >&2
            exit 1
          fi

          if [ "$FINAL_STATUS" != "Success" ]; then
            exit 1
          fi

      - name: Verify public endpoints
        shell: bash
        env:
          CHANGED_SERVICES: ${{ needs.detect.outputs.services_space }}
          DEPLOY_CONFIG_CHANGED: ${{ needs.detect.outputs.deploy_config_changed }}
          FORCE_RUNTIME_REFRESH: ${{ needs.detect.outputs.force_runtime_refresh }}
        run: |
          set -euo pipefail

          has_service() {
            target="$1"
            for service in $CHANGED_SERVICES; do
              if [ "$service" = "$target" ]; then
                return 0
              fi
            done
            return 1
          }

          has_backend_service() {
            for service in $CHANGED_SERVICES; do
              case "$service" in
                *-service) return 0 ;;
              esac
            done
            return 1
          }

          check_endpoint() {
            label="$1"
            url="$2"
            mode="$3"

            for attempt in $(seq 1 24); do
              status="$(
                curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$url" || true
              )"
              echo "$label attempt $attempt -> HTTP $status"

              case "$mode" in
                ok)
                  case "$status" in
                    2*|3*) return 0 ;;
                  esac
                  ;;
                non5xx)
                  case "$status" in
                    2*|3*|4*) return 0 ;;
                  esac
                  ;;
                *)
                  echo "Unknown check mode: $mode" >&2
                  return 1
                  ;;
              esac

              sleep 5
            done

            echo "$label did not reach an acceptable status." >&2
            return 1
          }

          if [ "$DEPLOY_CONFIG_CHANGED" = "true" ] || has_service frontend; then
            check_endpoint "frontend" "$AWS_DEV_PUBLIC_BASE_URL/" ok
          fi

          if [ "$DEPLOY_CONFIG_CHANGED" = "true" ] || has_service admin-frontend; then
            check_endpoint "admin frontend" "$AWS_DEV_ADMIN_PUBLIC_BASE_URL/" ok
          fi

          if [ "$DEPLOY_CONFIG_CHANGED" = "true" ] || [ "$FORCE_RUNTIME_REFRESH" = "true" ] || has_backend_service; then
            check_endpoint "plans api" "$AWS_DEV_PUBLIC_BASE_URL/api/v1/plans" non5xx
            check_endpoint "notes api" "$AWS_DEV_PUBLIC_BASE_URL/api/v1/notes" non5xx
            check_endpoint "ai models api" "$AWS_DEV_PUBLIC_BASE_URL/api/v1/ai/models" non5xx
          fi
